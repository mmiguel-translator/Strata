formance.now()+100000;\n    this.setState({ view:'country', activeCountry:name, detail:null, regionLoading:true, regionErr:null }, ()=>this.refreshLabelVisibility());\n    this.redrawTexture();\n    this.loadProvinces(name);\n  }\n\n  // geoBoundaries winds rings for the planar RFC 7946 right-hand rule, but d3's spherical\n  // functions (geoArea/geoCentroid/geoContains/geoBounds) use the OPPOSITE convention — they\n  // want exterior rings clockwise. Wound the other way, d3 treats each polygon as the whole-\n  // sphere complement, so a state's centroid comes back as its antipode, out in the wrong\n  // ocean. Rewind to exterior-CW / holes-CCW so the spherical math (label placement AND click-\n  // picking) is correct. geoPath is winding-agnostic, so the rendered borders are unaffected.\n  rewindFeature(f){\n    const g=f && f.geometry; if(!g) return f;\n    const ringArea=(ring)=>{ let a=0; for(let i=0,n=ring.length,j=n-1;i<n;j=i++){ a+=ring[j][0]*ring[i][1]-ring[i][0]*ring[j][1]; } return a/2; };\n    const fixPoly=(poly)=>{ for(let r=0;r<poly.length;r++){ const ring=poly[r]; const ccw=ringArea(ring)>0; const wantCCW=(r!==0); if(ccw!==wantCCW) ring.reverse(); } };\n    if(g.type==='Polygon') fixPoly(g.coordinates);\n    else if(g.type==='MultiPolygon') g.coordinates.forEach(fixPoly);\n    return f;\n  }\n\n  async loadProvinces(name){\n    const iso = NAME_ISO3[name] || NAME_ISO3[DATA_ALIAS[name]] || null;\n    if(!iso){ this.provinces=[]; this.setState({ regionLoading:false, regionErr:'Province-level boundaries aren\\u2019t available for this country.' }); return; }\n    try{\n      let gj=this.provCache[iso];\n      if(!gj){\n        const url='https://media.githubusercontent.com/media/wmgeolab/geoBoundaries/main/releaseData/gbOpen/'+iso+'/ADM1/geoBoundaries-'+iso+'-ADM1_simplified.geojson';\n        const r=await fetch(url); if(!r.ok) throw new Error('http '+r.status);\n        gj=await r.json();\n        for(const f of (gj.features||[])) this.rewindFeature(f) country:this.state.activeCountry, name:p.name, area:p.area };\n      this.labels.push(L); this.regionLabels.push(L);\n    }\n    this.refreshLabelVisibility();\n    this.buildProvinceBorders();\n  }\n  clearRegionLabels(){\n    this.clearProvinceBorders();\n    if(this.regionLabels && this.regionLabels.length){\n      for(const L of this.regionLabels){\n        if(this.labelGroup) this.labelGroup.remove(L.sprite);\n        if(L.sprite.material.map) L.sprite.material.map.dispose();\n        L.sprite.material.dispose();\n        const i=this.labels.indexOf(L); if(i>=0) this.labels.splice(i,1);\n      }\n    }\n    this.regionLabels=[];\n  }\n\n  openRegion(p,cx,cy){\n    this.setState({ detail:{ kind:'region', name:p.name, country:this.state.activeCountry, x:cx, y:cy } });\n    this.fetchRegionData(this.state.activeCountry, p.name);\n  }\n\n  // Resolves a text completion from whichever backend is available:\n  // the in-environment window.claude helper, or a Netlify serverless function when deployed.\n  async completeProfile(prompt){\n    if(window.claude && window.claude.complete){\n      return await window.claude.complete(prompt);\n    }\n    const r=await fetch('/.netlify/functions/region',{\n      method:'POST', headers:{'Content-Type':'application/json'},\n      body:JSON.stringify({ prompt })\n    });\n    if(!r.ok){ const t=await r.text().catch(()=>''); throw new Error('fn '+r.status+' '+t); }\n    const j=await r.json();\n    return j.text||'';\n  }\n\n  async fetchRegionData(country, region){\n    const key=country+'|'+region;\n    if(!this.regionData[key]){\n      try{ const s=localStorage.getItem('strata_region_'+key); if(s) this.regionData[key]=JSON.parse(s); }catch(_){}\n    }\n    if(this.regionData[key] && !this.regionData[key].loading){ this.forceUpdate(); return; }\n    this.regionData[key]={ loading:true }; this.forceUpdate();\n    try{\n      const cdisp=this.displayName(country);\n      const prompt='You are a precise geographic atlas describing the present day, in 2026. For the first-level administrative region \"'+region+'\" of '+cdisp+', write three concise, factual fields specific to THIS region (not the whole country). Respond with ONLY a raw JSON object, no markdown fences, with exactly these keys: \"dominant_religion\", \"dominant_ethnicity\", \"ideology_trend\". Each value is 2-3 plain sentences, neutral and present-tense.';\n      const raw=await this.completeProfile(prompt);\n      const txt=String(raw).replace(/```json/gi,'').replace(/```/g,'').trim();\n      const m=txt.match(/\\{[\\s\\S]*\\}/);\n      const obj=JSON.parse(m?m[0]:txt);\n      this.regionData[key]={\n        dominant_religion:obj.dominant_religion||'\\u2014',\n        dominant_ethnicity:obj.dominant_ethnicity||'\\u2014',\n        ideology_trend:obj.ideology_trend||'\\u2014'\n      };\n      try{ localStorage.setItem('strata_region_'+key, JSON.stringify(this.regionData[key])); }catch(_){}\n    }catch(e){\n      this.regionData[key]={ error:true, dominant_religion:'This region\\u2019s profile couldn\\u2019t be charted just now \\u2014 tap again to retry.', dominant_ethnicity:'\\u2014', ideology_trend:'\\u2014' };\n    }\n    const d=this.state.detail;\n    if(d && d.kind==='region' && d.country===country && d.name===region) this.forceUpdate();\n  }\n\n  goBack(){\n    const THREE=window.THREE;\n    if(this.state.view==='country'){\n      const ci=this.continentInfo[this.state.activeContinent];\n      this.hiRegion=null; this.provinces=null; this.clearRegionLabels();\n      const fromQ=this.globe.quaternion.clone();\n      const toQ=ci ? new THREE.Quaternion().setFromUnitVectors(ci.dir.clone().normalize(), new THREE.Vector3(0,0,1)) : fromQ;\n      this.focusAnim={ active:true, t:0, dur:1.0, fromQ, toQ, fromZ:this.camera.position.z, toZ:ci?ci.zoom:2.9 };\n      this.lastInteract=performance.now()+100000;\n      this.setState({ view:'continent', activeCountry:null, detail:null, regionLoading:false, regionErr:null }, ()=>this.refreshLa
