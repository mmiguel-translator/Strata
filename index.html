  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,maxPx){\n    if(!this.labels || !this.renderer) return null;\n    const THREE=window.THREE, rect=this.renderer.domElement.getBoundingClientRect();\n    const camDir=this.camera.position.clone().normalize();\n    const q=this.globe.quaternion, wp=new THREE.Vector3();\n    let best=null, bestD=Infinity;\n    for(const L of this.labels){\n      if(!L.sprite.visible || L.kind!=='country') continue;\n      if(L.dir.clone().applyQuaternion(q).dot(camDir) <= 0.12) continue; // front hemisphere only\n      L.sprite.getWorldPosition(wp);\n      const p=wp.clone().project(this.camera);\n      if(p.z > 1) continue;\n      const sx=rect.left+(p.x*0.5+0.5)*rect.width;\n      const sy=rect.top+(-p.y*0.5+0.5)*rect.height;\n      const d=Math.hypot(sx-cx, sy-cy);\n      if(d<bestD){ bestD=d; best=L; }\n    }\n    return (best && bestD <= (maxPx||92)) ? best : null;\n  }\n\n  onHover(cx,cy){\n    const now=performance.now(); if(now-this._lastHover<32) return; this._lastHover=now;\n    if(this.state.view==='country'){\n      const p=this.provinces ? this.pickRegion(cx,cy) : null;\n      const cur=this.hiRegion?this.hiRegion.name:null, nxt=p?p.name:null;\n      if(cur!==nxt){ this.hiRegion=p; this.redrawTexture(); this.updateHiBorder(); }\n      this.renderer.domElement.style.cursor = p ? 'pointer' : 'grab';\n      return;\n    }\n    let names=new Set(); let actionable=false;\n    const rec=this.pickCountry(cx,cy);\n    if(rec && rec.continent){\n      if(this.state.view==='world'){\n        for(const m of this.continentInfo[rec.continent].members) names.add(m.name);\n        actionable=true;\n      } else if(rec.continent===this.state.activeContinent){\n        names.add(rec.name); actionable=true;\n      }\n    }\n    // diff\n    let same = names.size===this.hiNames.size;\n    if(same){ for(const n of names){ if(!this.hiNames.has(n)){ same=false; break; } } }\n    if(!same){ this.hiNames=names; this.redrawTexture(); }\n    this.renderer.domElement.style.cursor = actionable ? 'poi HREE, rec=this.byName[name];\n    if(!rec) return;\n    this.hiNames=new Set(); this.hiRegion=null; this.provinces=null; this.clearRegionLabels();\n    const fromQ=this.globe.quaternion.clone();\n    const toQ=new THREE.Quaternion().setFromUnitVectors(rec.dir.clone().normalize(), new THREE.Vector3(0,0,1));\n    this.focusAnim={ active:true, t:0, dur:1.05, fromQ, toQ, fromZ:this.camera.position.z, toZ:this.countryZoom(rec) };\n    this.lastInteract=performance.now()+100000;\n    this.setState({ view:'country', activeCountry:name, detail:null, regionLoading:true, regionErr:null }, ()=>this.refreshLabelVisibility());\n    this.redrawTexture();\n    this.loadProvinces(name);\n  }\n\n  // geoBoundaries winds rings for the planar RFC 7946 right-hand rule, but d3's spherical\n  // functions (geoArea/geoCentroid/geoContains/geoBounds) use the OPPOSITE convention — they\n  // want exterior rings clockwise. Wound the other way, d3 treats each polygon as the whole-\n  // sphere complement, so a state's centroid comes back as its antipode, out in the wrong\n  // ocean. Rewind to exterior-CW / holes-CCW so the spherical math (label placement AND click-\n  // picking) is correct. geoPath is winding-agnostic, so the rendered borders are unaffected.\n  rewindFeature(f){\n    const g=f && f.geometry; if(!g) return f;\n    const ringArea=(ring)=>{ let a=0; for(let i=0,n=ring.length,j=n-1;i<n;j=i++){ a+=ring[j][0]*ring[i][1]-ring[i][0]*ring[j][1]; } return a/2; };\n    const fixPoly=(poly)=>{ for(let r=0;r<poly.length;r++){ const ring=poly[r]; const ccw=ringArea(ring)>0; const wantCCW=(r!==0); if(ccw!==wantCCW) ring.reverse(); } };\n    if(g.type==='Polygon') fixPoly(g.coordinates);\n    else if(g.type==='MultiPolygon') g.coordinates.forEach(fixPoly);\n    return f;\n  }\n\n  async loadProvinces(name){\n    const iso = NAME_ISO3[name] || NAME_ISO3[DATA_ALIAS[name]] || null;\n    if(!iso){ this.provinces=[]; this.setState({ regionLoading:false, regionErr:'Province-level boundaries aren this.globe.quaternion.clone();\n      const toQ=ci ? new THREE.Quaternion().setFromUnitVectors(ci.dir.clone().normalize(), new THREE.Vector3(0,0,1)) : fromQ;\n      this.focusAnim={ active:true, t:0, dur:1.0, fromQ, toQ, fromZ:this.camera.position.z, toZ:ci?ci.zoom:2.9 };\n      this.lastInteract=performance.now()+100000;\n      this.setState({ view:'continent', activeCountry:null, detail:null, regionLoading:false, regionErr:null }, ()=>this.refreshLabelVisibility());\n      this.redrawTexture();\n    } else {\n      this.goWorld();\n    }\n  }\n  goWorld(){\n    this.hiNames=new Set(); this.hiRegion=null; this.provinces=null; this.clearRegionLabels();\n    this.focusAnim={ active:true, t:0, dur:1.0, fromQ:this.globe.quaternion.clone(), toQ:this.globe.quaternion.clone(), fromZ:this.camera.position.z, toZ:2.9 };\n    this.lastInteract=performance.now();\n    this.setState({ view:'world', activeContinent:null, activeCountry:null, detail:null, regionLoading:false, regionErr:null }, ()=>this.refreshLabelVisibility());\n    this.redrawTexture();\n  }\n\n  renderVals(){\n    this.refs();\n    const A=window.ATLAS_DATA;\n    const st=this.state, d=st.detail;\n\n    // ---- detail panel (region / country tooltip) ----\n    let dd=null, ddLoading=false, kindLabel='';\n    if(d){\n      if(d.kind==='country'){ dd=this.dataOf(d.name); kindLabel='Country'; }\n      else if(d.kind==='region'){\n        kindLabel='Region · '+this.displayName(d.country);\n        const rv=this.regionData[d.country+'|'+d.name];\n        if(rv && !rv.loading) dd=rv; else ddLoading=true;\n      }\n    }\n\n    // ---- margin info panel (current level: continent or country) ----\n    let panelKicker='', panelTitle='', pData=null, panelHint='';\n    if(st.view==='continent'){\n      panelKicker='Region'; panelTitle=st.activeContinent||'';\n      pData = A?A.continents[st.activeContinent]:null;\n      panelHint='Tap a country to zoom in.';\n    } else if(st.view==='country'){\n      panelKicker='Country
